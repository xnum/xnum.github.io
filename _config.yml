# Jekyll configuration

name: xnum's blog
description: Software Developer

# Url is currently only used only for the RSS feed in feed.xml
url: 'https://xnum.github.io'
#url: http://localhost:4000

# For a project page here should be a project name. Otherwise (for user's/organizaion's page leave it empty)
baseurl: ''

plugins:
  - jekyll-sitemap
  - jekyll-paginate

author:
  facebook:         xnumtw
  youtubeUser:      
  youtubeChannel:   
  twitter:          
  github:           xnum
  stackoverflow:    
  quora:            
  linkedin:         xnumtw
  pinterest:    
  googlePlus:       
  instagram:        
  reddit:           
  medium:           
  tumblr:           
  email:            xnumtw@gmail.com


social:
  github: xnum
  linkedin: xnumtw
  rss: feed.xml

# Google Analytics key, leave blank to ignore
# google_analytics_key: 'UA-69634995-2'
google-analytics:
  id:               'UA-69634995-2'
# Yandex metrica (https://metrica.yandex.com/) leave blank to ignore or put true to use
yandex_metrica:


# Set this to your disqus shortname to enable comments. Note that the 'comments'
# setting below must also be true. Individual posts can override 'comments' to
# disable on a post-by-post basis
disqus: 
  id:      'xnum'
comments: true

paginate:           5
paginate_path:      /page:num/

permalink: /:year/:month/:title

# Enable for using pages, more details are here: http://jekyllrb.com/docs/pagination/
#paginate: 3

#highlighter: rouge

markdown: kramdown
kramdown:
  input: GFM # Enable GitHub Flavored Markdown (fenced code blocks)
  hard_wrap: true
highlighter: rouge

nav:
  - name:           "About"
    url:            "/about"
  - name:           "Archive"
    url:            "/archive"
  - name:           "Tags"
    url:            "/tags"
  - name:           "Projects"
    url:            "/projects"

# Sass
sass:
  sass_dir:         _sass
  style:            :compressed

# Scopes
defaults:
  -
    scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"


exclude: ['README.md', 'LICENSE']
